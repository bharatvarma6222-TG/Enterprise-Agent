services:

  backend:
    build: ./backend
    container_name: enterprise_backend

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    container_name: enterprise_frontend

    ports:
      - "4173:4173"

    environment:
      - VITE_API_URL=http://localhost:8000

    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: enterprise_qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
